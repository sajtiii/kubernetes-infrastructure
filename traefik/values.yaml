dashboard:
  hostname: ""
  allowedIps: []

traefik:
  ports:
    web:
      expose:
        default: true
      exposedPort: 80
      http:
        forwardedHeaders:
          insecure: true
        redirections:
          entryPoint:
            to: websecure
            priority: 65536
    websecure:
      expose:
        default: true
      exposedPort: 443
      http:
        forwardedHeaders:
          insecure: true

  service:
    type: ClusterIP
  ports:
    websecure:
      hostPort: 443

  priorityClassName: traefik-high-priority

  deployment:
    kind: DaemonSet
    replicas: 1
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9100"

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  autoscaling:
    enabled: false

  rbac:
    enabled: true
    namespaced: false

  providers:
    kubernetesIngress:
      enabled: true
    kubernetesGateway:
      enabled: true
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true

  metrics:
    prometheus:
      addEntryPointsLabels: true
      addRoutersLabels: true
      addServicesLabels: true