apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: k3s-backup
spec:
  backend:
    repoPasswordSecretRef:
      name: backup-repo-credentials
      key: repoPassword
    rest:
      url: {{ .Values.backup.repo.url | quote }}
      userSecretRef:
        name: backup-repo-credentials
        key: userUsername
      passwordSecretRef:
        name: backup-repo-credentials
        key: userPassword
  backup:
    schedule: {{ .Values.backup.schedule | quote }}
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
  check:
    schedule: '0 5 * * 1'
  prune:
    schedule: '0 5 * * */2'
    retention:
      {{ .Values.backup.retention | toYaml | nindent 8 }}
