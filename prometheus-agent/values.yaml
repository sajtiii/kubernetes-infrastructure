prometheus:
  alertmanager:
    enabled: false

  pushgateway:
    enabled: false

  configmapReload:
    prometheus:
      enabled: false

  server:
    agentMode: true

    global:
      scrape_interval: 10s
      scrape_timeout: 10s
      evaluation_interval: 10s

    persistentVolume:
      enabled: false

    remoteWrite: [] # Should be set to the URL of the Prometheus server that will receive the data from this agent

    extraFlags:
      - storage.agent.wal-compression

    extraArgs:
      storage.agent.retention.max-time: 30m

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

