prometheus:
  alertmanager:
    enabled: false

  pushgateway:
    enabled: false

  configmapReload:
    prometheus:
      enabled: false

  server:
    global:
      scrape_interval: 10s
      scrape_timeout: 10s
      evaluation_interval: 10s

    persistentVolume:
      enabled: false

    remoteWrite: [] # Should be set to the URL of the Prometheus server that will receive the data from this agent

    defaultFlagsOverride:
      - --enable-feature=agent
      - --config.file=/etc/config/prometheus.yml
      - --storage.agent.path=/data
      - --storage.agent.wal-compression
      - --storage.agent.retention.max-time=30m
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

