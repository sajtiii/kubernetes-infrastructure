argo-cd:
  crds:
    install: true

  global:
    domain: "" # Has to be specified
    addPrometheusAnnotations: true
      
  configs:
    params:
      server.insecure: true

    # cm:
    #   oidc.config: |
    #     name: OPENID
    #     issuer: https://issuer-url
    #     clientID: ""
    #     clientSecret: ""
    #     requestedScopes: ["openid", "profile", "email", "groups"]

    rbac:
      # -- OIDC scopes to examine during rbac enforcement (in addition to `sub` scope).
      # The scope value can be a string, or a list of strings.
      scopes: "[groups]"
      policy.csv: ''
      # Policy rules are in the form:
      #  p, subject, resource, action, object, effect
      # Role definitions and bindings are in the form:
      #  g, subject, inherited-subject
      # policy.csv: |
      #   p, role:org-admin, applications, *, */*, allow
      #   p, role:org-admin, clusters, get, *, allow
      #   p, role:org-admin, repositories, *, *, allow
      #   p, role:org-admin, logs, get, *, allow
      #   p, role:org-admin, exec, create, */*, allow
      #   g, your-github-org:your-team, role:org-admin
    
  redis:
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  redis-ha:
    enabled: false
    haproxy:
      metrics:
        enabled: true

  controller:
    replicas: 1
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  server:
    replicas: 1
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  repoServer:
    replicas: 1
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  dex:
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 128Mi

  applicationSet:
    replicas: 1
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  notifications:
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi


argocd-image-updater:
  config:
    registries: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

argo-rollouts:
  controller:
    extraArgs:
      - "--traefik-api-group=traefik.io"
      - "--traefik-api-version=traefik.io/v1alpha1"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi